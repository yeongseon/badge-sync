site_name: badge-sync
site_description: Automatically detect, generate, validate, and repair README badges
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/badge-sync
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - Home: index.md
  - Usage:
      - CLI Reference: CLI.md
      - GitHub Action: github-action.md
      - Configuration: configuration.md
  - Internals:
      - Architecture: architecture.md
      - Design Philosophy: design.md
  - Development:
      - Setup: development.md
      - Testing: testing.md
      - Troubleshooting: troubleshooting.md
  - Security: security.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/badge-sync
  copyright: |
    (c) 2026 Yeongseon Choe -- MIT Licensed
