name: badge-sync bot
description: |
  Automatically keep README badges in sync.
  Runs badge-sync on a schedule or when metadata files change,
  and creates a pull request if badges are out of date.

  Copy this file into your repository at .github/workflows/badge-sync.yml

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - '.github/workflows/*.yml'
      - 'LICENSE'
      - 'badgesync.config.*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  badge-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: yeongseon/badge-sync@v1
        with:
          command: apply

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync README badges'
          title: 'chore: sync README badges'
          body: |
            Automated badge sync by [badge-sync](https://github.com/yeongseon/badge-sync).

            Detected that README badges are out of date with the current project metadata.
            This PR updates the badge block to match.
          branch: badge-sync/update
          delete-branch: true
          labels: badges, automated
